name: spc-download

on:
    schedule:
        -   cron: '0 0 * * *'
    workflow_dispatch:

permissions:
    contents: read
    actions: write

jobs:
    download:
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            actions: write
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            -   name: Set architecture variables
                run: |
                    if [[ "${{ matrix.arch }}" == "arm64" ]]; then
                      echo "RPM_ARCH=aarch64" >> $GITHUB_ENV
                    else
                      echo "RPM_ARCH=x86_64" >> $GITHUB_ENV
                    fi

            -   name: Install composer
                run: |
                    sudo curl -L https://files.henderkes.com/${RPM_ARCH}-linux/php -o /usr/local/bin/php
                    sudo chmod +x /usr/local/bin/php
                    sudo curl -sS https://raw.githubusercontent.com/composer/getcomposer.org/f3108f64b4e1c1ce6eb462b159956461592b3e3e/web/installer | php -- --quiet
                    sudo mv composer.phar /usr/local/bin/composer

            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    persist-credentials: false

            -   name: Composer install
                run: composer install

            -   name: Download extensions
                run: |
                    php vendor/bin/spc download --shallow-clone -e amqp,apcu,ast,bcmath,brotli,bz2,calendar,ctype,curl,dba,dio,dom,ds,ev,event,exif,ffi,fileinfo,filter,ftp,gd,gettext,gmp,gmssl,grpc,iconv,igbinary,imagick,inotify,intl,ldap,libxml,lz4,maxminddb,mbregex,mbstring,memcache,memcached,mongodb,msgpack,mysqli,mysqlnd,mysqlnd_parsec,mysqlnd_ed25519,odbc,opcache,openssl,opentelemetry,parallel,password-argon2,pcov,pcntl,pdo,pdo_mysql,pdo_odbc,pdo_pgsql,pdo_sqlite,pdo_sqlsrv,pgsql,phar,posix,protobuf,rar,rdkafka,readline,redis,session,shmop,simdjson,simplexml,snappy,soap,sockets,sodium,spx,sqlite3,sqlsrv,ssh2,swoole,sysvmsg,sysvsem,sysvshm,tidy,tokenizer,uuid,uv,xdebug,xhprof,xlswriter,xml,xmlreader,xmlwriter,xsl,xz,yac,yaml,zip,zlib,zstd

            -   name: Create tarball (keep permissions)
                run: |
                    tar -czf downloads.tar.gz -C downloads .

            -   name: Upload downloads directory
                uses: actions/upload-artifact@v4
                with:
                    name: downloads-tarball
                    path: downloads.tar.gz
                    retention-days: 2

            -   name: Trigger build-rpm-modular-packages workflow
                if: success()
                run: gh workflow run build-rpm-modular-packages.yml
                env:
                    GH_TOKEN: ${{ secrets.GH_PAT }} # use our own user as the triggering user

            -   name: Trigger build-gcc-deb-packages workflow
                if: success()
                run: gh workflow run build-gcc-deb-packages.yml
                env:
                    GH_TOKEN: ${{ secrets.GH_PAT }} # use our own user as the triggering user

            -   name: Trigger build-deb-forgejo workflow
                if: success()
                run: gh workflow run build-deb-forgejo.yml
                env:
                    GH_TOKEN: ${{ secrets.GH_PAT }} # use our own user as the triggering user

            -   name: Trigger build-apk-forgejo workflow
                if: success()
                run: gh workflow run build-apk-forgejo.yml
                env:
                    GH_TOKEN: ${{ secrets.GH_PAT }} # use our own user as the triggering user
